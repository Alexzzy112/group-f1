<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Election System for NACOS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand">
        <div class="logo">🎓</div>
        <span class="brand-text">GroupF1</span>
      </div>
      <div class="nav-links">
        <a href="/" class="nav-link" id="electionLink">Election</a>
        <a href="/admin" class="nav-link active" id="adminLink">Admin Login</a>
      </div>
    </div>
  </nav>

  <main class="container admin-container">
    <h1>Admin Dashboard</h1>

    <div id="loginForm" class="card">
      <h2>Admin Login</h2>
      <form id="adminLoginForm">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="admin" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="password" required />

        <button type="submit">Login</button>
      </form>
    </div>

    <div id="adminPanel" class="card" style="display: none;">
      <h2>Voter Activities</h2>
      <div id="stats">
        <div class="stat-card">
          <h3>Total Votes</h3>
          <span id="totalVotes">0</span>
        </div>
        <div class="stat-card">
          <h3>Unique Voters</h3>
          <span id="uniqueVoters">0</span>
        </div>
      </div>

      <div class="activities-section">
        <h3>Recent Activities</h3>
        <div id="activitiesList" class="activities-list">
          <!-- Activities will be populated here -->
        </div>
      </div>

      <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>

    <div id="message" class="message" aria-live="polite"></div>
  </main>

  <script>
    const loginForm = document.getElementById('adminLoginForm');
    const adminPanel = document.getElementById('adminPanel');
    const loginFormDiv = document.getElementById('loginForm');
    const messageEl = document.getElementById('message');
    const logoutBtn = document.getElementById('logoutBtn');
    const activitiesList = document.getElementById('activitiesList');
    const totalVotesEl = document.getElementById('totalVotes');
    const uniqueVotersEl = document.getElementById('uniqueVoters');

    // Simple authentication (in production, use proper authentication)
    const ADMIN_CREDENTIALS = { username: 'admin', password: 'admin123' };

    let messageTimeout;

    function setMessage(text, type) {
      // Clear any existing timeout
      if (messageTimeout) {
        clearTimeout(messageTimeout);
      }
      
      messageEl.textContent = text;
      messageEl.className = `message ${type} show`;
      
      // Auto-hide after 3 seconds
      messageTimeout = setTimeout(() => {
        messageEl.className = `message ${type}`;
      }, 3000);
    }

    function showAdminPanel() {
      loginFormDiv.style.display = 'none';
      adminPanel.style.display = 'block';
      loadActivities();
    }

    function showLoginForm() {
      adminPanel.style.display = 'none';
      loginFormDiv.style.display = 'block';
      messageEl.textContent = '';
    }

    async function loadActivities() {
      try {
        const response = await fetch('/admin/activities');
        const data = await response.json();

        totalVotesEl.textContent = data.totalVotes;
        uniqueVotersEl.textContent = data.uniqueVoters;

        activitiesList.innerHTML = '';
        if (data.activities.length === 0) {
          activitiesList.innerHTML = '<p>No activities yet.</p>';
        } else {
          data.activities.forEach(activity => {
            const activityItem = document.createElement('div');
            activityItem.className = 'activity-item';
            const approvalStatus = activity.approved ? '<span class="approved-badge">✓ Approved</span>' : '';
            activityItem.innerHTML = `
              <div class="activity-info">
                <strong>${activity.name}</strong> voted for <strong>${activity.position || 'N/A'}</strong> ${approvalStatus}
                <span class="activity-time">${new Date(activity.timestamp).toLocaleString()}</span>
              </div>
              <div class="activity-id">ID: <strong>${activity.studentId}</strong></div>
              <div class="activity-actions">
                ${activity.approved ? '' : '<button class="approve-btn" data-student-id="' + activity.studentId + '">Approve</button>'}
                <button class="delete-btn" data-student-id="${activity.studentId}">Delete</button>
              </div>
            `;
            activitiesList.appendChild(activityItem);
          });
        }
      } catch (error) {
        console.error('Error loading activities:', error);
        setMessage('Error loading activities.', 'error');
      }
    }

    loginForm.addEventListener('submit', function (event) {
      event.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
        showAdminPanel();
        setMessage('Login successful!', 'success');
      } else {
        setMessage('Invalid credentials.', 'error');
      }
    });

    logoutBtn.addEventListener('click', function () {
      showLoginForm();
      loginForm.reset();
    });

    // Handle approve and delete buttons
    activitiesList.addEventListener('click', function (event) {
      if (event.target.classList.contains('approve-btn')) {
        const studentId = event.target.dataset.studentId;
        approveVoter(studentId);
      } else if (event.target.classList.contains('delete-btn')) {
        const studentId = event.target.dataset.studentId;
        deleteVoter(studentId);
      }
    });

    async function approveVoter(studentId) {
      try {
        const response = await fetch('/admin/approve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ studentId })
        });
        const result = await response.json();
        setMessage(result.message, 'success');
        loadActivities(); // Refresh the list
      } catch (error) {
        console.error('Error approving voter:', error);
        setMessage('Error approving voter.', 'error');
      }
    }

    async function deleteVoter(studentId) {
      if (!confirm('Are you sure you want to delete this voter?')) return;
      
      try {
        const response = await fetch('/admin/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ studentId })
        });
        const result = await response.json();
        setMessage(result.message, 'success');
        loadActivities(); // Refresh the list
      } catch (error) {
        console.error('Error deleting voter:', error);
        setMessage('Error deleting voter.', 'error');
      }
    }

    // Check if already logged in (simple session check)
    if (sessionStorage.getItem('adminLoggedIn') === 'true') {
      showAdminPanel();
    }
  </script>
</body>
</html>
