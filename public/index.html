<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Election System for NACOS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand">
        <div class="logo">🎓</div>
        <span class="brand-text">GroupF1</span>
      </div>
      <div class="nav-links">
        <a href="/" class="nav-link active" id="electionLink">Election</a>
        <a href="/admin" class="nav-link" id="adminLink">Admin Login</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <h1>Election System for NACOS</h1>

    <form id="voteForm" class="card">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Alex Smith" required />

      <label for="studentId">Student ID Number</label>
      <input type="text" id="studentId" name="studentId" placeholder="FT24cmp0001" required />

      <label for="position">Position to Vote For</label>
      <input type="text" id="position" name="position" placeholder="e.g., President, Secretary, Treasurer" required />

      <button type="submit">Submit Vote</button>
    </form>

    <div id="message" class="message" aria-live="polite"></div>
  </main>

  <script>
    const form = document.getElementById('voteForm');
    const messageEl = document.getElementById('message');

    let messageTimeout;

    function setMessage(text, type) {
      // Clear any existing timeout
      if (messageTimeout) {
        clearTimeout(messageTimeout);
      }
      
      messageEl.textContent = text;
      messageEl.className = `message ${type} show`;
      
      // Auto-hide after 3 seconds
      messageTimeout = setTimeout(() => {
        messageEl.className = `message ${type}`;
      }, 3000);
    }

    form.addEventListener('submit', async function (event) {
      event.preventDefault();

      const name = document.getElementById('name').value.trim();
      const studentId = document.getElementById('studentId').value.trim();
      const position = document.getElementById('position').value.trim();

      if (!name || !studentId || !position) {
        setMessage('Please enter both name and student ID.', 'error');
        return;
      }

      const idPattern = /^FT\d{2}CMP/i;
      if (!idPattern.test(studentId.replace(/\s+/g, ''))) {
        setMessage('Invalid Detail. You are not Eligible', 'error');
        document.getElementById('studentId').value = '';
        return;
      }

      try {
        const response = await fetch('/vote', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, studentId, position }),
        });

        const result = await response.json();

        if (response.ok) {
          setMessage(result.message, 'success');
          form.reset();
        } else if (response.status === 409) {
          setMessage(result.message, 'warning');
        } else {
          setMessage(result.message || 'Unable to submit vote.', 'error');
        }
      } catch (error) {
        setMessage('Server error. Please try again.', 'error');
        console.error(error);
      }
    });
  </script>
</body>
</html>
